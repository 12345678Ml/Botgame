<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الإيموجي</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #1a1a2e;
            color: white;
            padding: 50px;
        }
        .emoji {
            font-size: 60px;
            margin: 30px;
        }
        input {
            padding: 15px;
            font-size: 20px;
            border-radius: 10px;
            border: none;
            width: 200px;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #f5c842;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        #result {
            font-size: 24px;
            margin: 20px;
        }
        #score {
            font-size: 20px;
            color: #f5c842;
        }
    </style>
</head>
<body>

    <h1>🎮 خمن الكلمة</h1>
    <div class="emoji" id="emoji">🐈 + ر</div>
    <input id="answer" placeholder="اكتب الجواب">
    <br>
    <button onclick="check()">تحقق</button>
    <div id="result"></div>
    <div id="score">⭐ النقاط: 0</div>

    <script>
        const questions = [
            { q: "🐈 + ر", a: "قطر" },
            { q: "🌙 + ر", a: "قمر" },
            { q: "🔥 + ب", a: "لهب" }
        ];

        let current = 0;
        let score = 0;

        function load() {
            document.getElementById("emoji").textContent = questions[current].q;
            document.getElementById("answer").value = "";
            document.getElementById("result").textContent = "";
        }

        function check() {
            let user = document.getElementById("answer").value.trim();
            let correct = questions[current].a;

            if (user.toLowerCase() === correct.toLowerCase()) {
                document.getElementById("result").textContent = "✅ صح!";
                score++;
            } else {
                document.getElementById("result").textContent = "❌ غلط! الجواب: " + correct;
            }

            document.getElementById("score").textContent = "⭐ النقاط: " + score;
            current++;

            if (current < questions.length) {
                setTimeout(load, 1500);
            } else {
                document.getElementById("emoji").textContent = "🎉 انتهت اللعبة!";
            }
        }

        load();
    </script>
</body>
</html>
